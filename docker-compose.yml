version: '3.8'

services:
  ascend-mcp:
    build: .
    container_name: ascend-mcp
    restart: always
    environment:
      - PORTFOLIO_API_URL=${PORTFOLIO_API_URL:-http://portfolio-app:3000/api}
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_TRANSPORT=${MCP_TRANSPORT:-sse}
      - PORT=${PORT:-3001}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    networks:
      - portfolio_network
    stdin_open: true
    tty: true

networks:
  portfolio_network:
    external: true
